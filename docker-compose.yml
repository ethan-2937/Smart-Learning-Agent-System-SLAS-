services:
  mysql:
    image: mysql:8.0
    container_name: smart-learning-mysql
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --performance_schema=OFF
      - --innodb_buffer_pool_size=128M
      - --max_connections=50
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: smart_learning
    ports:
      - "3306:3306"
    volumes:
      - ./data/mysql:/var/lib/mysql
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: smart-learning-qdrant
    ports:
      - "6333:6333"
    volumes:
      - ./data/qdrant:/qdrant/storage
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    container_name: smart-learning-backend
    depends_on:
      - mysql
      - qdrant
    environment:
      SPRING_PROFILES_ACTIVE: mysql
      MYSQL_URL: jdbc:mysql://mysql:3306/smart_learning?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
      MYSQL_USERNAME: root
      MYSQL_PASSWORD: root
      QDRANT_URL: http://qdrant:6333
      APP_VECTOR_PROVIDER: qdrant
      AI_PROVIDER: mock
    ports:
      - "18082:18082"
    volumes:
      - ./data/uploads:/app/uploads
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: smart-learning-frontend
    depends_on:
      - backend
    ports:
      - "8080:80"
    restart: unless-stopped
