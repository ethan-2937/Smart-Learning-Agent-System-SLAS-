spring:
  application:
    name: smart-learning-agent
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 80MB
  sql:
    init:
      mode: never
server:
  port: 18082
mybatis:
  mapper-locations: classpath*:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
app:
  repository:
    provider: memory
  storage:
    upload-dir: uploads
  ai:
    provider: mock
    base-url: ${AI_BASE_URL:}
    chat-path: ${AI_CHAT_PATH:/v1/chat/completions}
    api-key: ${AI_API_KEY:}
    model: ${AI_MODEL:deepseek-chat}
    temperature: 0.2
    timeout-seconds: 120
    max-output-tokens: 1600
  vector:
    provider: memory
    collection-name: smart_learning_chunks
    qdrant-url: ${QDRANT_URL:http://localhost:6333}
    dimension: 64
    top-k: 6

